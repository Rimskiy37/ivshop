<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVSHOP - Профиль</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<style>
    .logout-btn {
        background-color: #ff4757;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logout-btn:hover {
        background-color: #e84118;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .profile-actions {
        margin-top: 30px;
        text-align: center;
    }
</style>

<body class="dark-theme">
    <div class="profile-header">
        <div class="avatar-container large">
            <i class="fas fa-user"></i>
        </div>
        <h1 id="username">Загрузка...</h1>
        <div class="profile-rating">★★★★★ 5.0</div>
        <div class="profile-balance" id="profile-balance" style="font-size: 1.5rem; color: var(--primary-color); margin: 10px 0;">0 ₽</div>
        <div class="seller-request">
            <button id="become-seller-btn" class="seller-btn" style="background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s;">Стать продавцом</button>
        </div>
    </div>

    
    <!-- В табе "Мои товары" кнопка "Выставить товар" -->
    <button class="add-product" onclick="location.href='seller.html'" style="background-color: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: all 0.3s;">➕ Выставить товар</button>

    <!-- Кнопка выхода -->
    <div class="profile-actions">
        <button class="logout-btn" id="logout-btn" style="background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s;">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
    </div>

    <main>
        <section class="profile-section">
            <div class="container">
                <div class="profile-header">
                    <div class="avatar-container large">
                        <i class="fas fa-user"></i>
                    </div>
                    <h1 id="username">Загрузка...</h1>
                    <div class="profile-rating">★★★★★ 5.0</div>
                    <div class="profile-balance" id="profile-balance">0 ₽</div>   <!-- добавлено -->
                    <div class="seller-request">
                        <button id="become-seller-btn" class="seller-btn">Стать продавцом</button>
                    </div>
                </div>

                <div class="profile-tabs">
                    <button class="tab-button active" data-tab="purchases">Мои покупки</button>
                    <button class="tab-button" data-tab="products">Мои товары</button>
                    <button class="tab-button" data-tab="sales">Продажи</button>
                </div>

                <div id="purchases" class="tab-content active-tab">
                    <div id="purchases-list">
                        <p class="empty-message">Загрузка...</p>
                    </div>
                </div>

                <div id="products" class="tab-content">
                    <div id="seller-products-list">
                        <p class="empty-message">У вас нет товаров</p>
                    </div>
                    <button class="add-product" onclick="location.href='seller.html'">➕ Выставить товар</button>
                </div>

                <div id="sales" class="tab-content">
                    <div id="sales-list">
                        <p class="empty-message">Продаж пока нет</p>
                    </div>
                </div>

                <div class="profile-actions">
                    <button class="logout-btn" id="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
